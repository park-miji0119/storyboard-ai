<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character & Background Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24; --border: #2a2a3a;
    --accent: #c8913a; --accent2: #e8b86d; --text: #e8e4d8; --text2: #9090a0;
    --card: #13131e; --red: #8b2020;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-weight: 300; min-height: 100vh; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 10%, rgba(200,145,58,0.06) 0%, transparent 50%), radial-gradient(ellipse at 80% 90%, rgba(139,32,32,0.08) 0%, transparent 50%); pointer-events: none; z-index: 0; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
  header { padding: 40px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
  .header-inner { display: flex; align-items: center; gap: 16px; }
  .logo { width: 44px; height: 44px; background: linear-gradient(135deg, var(--accent), var(--red)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  h1 { font-family: 'Cinzel', serif; font-size: 24px; background: linear-gradient(135deg, var(--accent2), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { font-size: 12px; color: var(--text2); margin-top: 3px; letter-spacing: 1px; }
  .api-row { display: flex; gap: 12px; margin-bottom: 20px; }
  .api-box { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
  .api-label { font-size: 11px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
  .api-input { flex: 1; background: none; border: none; color: var(--text); font-size: 13px; outline: none; }
  .api-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
  .api-dot.on { background: #4aab6d; box-shadow: 0 0 6px rgba(74,171,109,0.5); }
  .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media(max-width:700px){ .input-grid { grid-template-columns: 1fr; } }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .panel-head { padding: 14px 18px; background: var(--bg3); border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .panel-body { padding: 16px; }
  textarea, select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; }
  textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; line-height: 1.7; }
  .style-tip { margin-top: 12px; padding: 12px 14px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); font-size: 11px; color: var(--text2); line-height: 1.8; }
  .btn-wrap { display: flex; gap: 12px; margin-bottom: 32px; }
  .btn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; }
  .btn-char { background: linear-gradient(135deg, var(--red), #6b1515); color: #f0e8d8; }
  .btn-bg { background: linear-gradient(135deg, #1a4a3a, #0d2a20); color: #c0e8d0; border: 1px solid #2a6b4a; }
  .btn-all { background: linear-gradient(135deg, var(--accent), #a8712a); color: #0a0a0f; }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .progress-wrap { display: none; margin-bottom: 24px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
  .progress-wrap.show { display: block; }
  .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  .progress-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.4s; width: 0%; }
  .section-title { font-family: 'Cinzel', serif; font-size: 14px; color: var(--accent); letter-spacing: 2px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .image-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }
  .image-card:hover { border-color: rgba(200,145,58,0.4); }
  .image-card-head { padding: 12px 14px; background: var(--bg3); border-bottom: 1px solid var(--border); }
  .image-card-name { font-size: 13px; font-weight: 500; }
  .image-card-type { font-size: 10px; color: var(--text2); letter-spacing: 1px; margin-top: 2px; }
  .image-box { min-height: 160px; display: flex; align-items: center; justify-content: center; background: var(--bg); position: relative; overflow: hidden; }
  .image-box img { width: 100%; display: block; cursor: zoom-in; transition: transform 0.2s; }
  .image-box img:hover { transform: scale(1.02); }
  .image-box.loading { flex-direction: column; gap: 10px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .image-card-foot { padding: 10px 14px; }
  .prompt-mini { font-size: 11px; color: var(--text2); font-family: monospace; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .copy-btn { margin-top: 6px; font-size: 11px; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; color: var(--text2); padding: 3px 8px; cursor: pointer; transition: all 0.2s; }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .error-msg { color: #e07070; font-size: 12px; padding: 8px 14px; }
  .empty { text-align: center; padding: 60px; color: var(--text2); }
  .empty-icon { font-size: 48px; opacity: 0.3; margin-bottom: 12px; }
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
  .lightbox-close { position: fixed; top: 20px; right: 24px; font-size: 32px; color: var(--text2); cursor: pointer; line-height: 1; transition: color 0.2s; background: none; border: none; }
  .lightbox-close:hover { color: var(--text); }
  .lightbox-name { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); font-family: 'Cinzel', serif; font-size: 14px; color: var(--accent); letter-spacing: 2px; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()"/>
  <div class="lightbox-name" id="lightboxName"></div>
</div>
<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo">🎬</div>
      <div>
        <h1>CHARACTER & BACKGROUND AI</h1>
        <div class="subtitle">Powered by Seedream 4.5 · Hyperrealistic 3D Animation</div>
      </div>
    </div>
  </header>
  <div class="api-row">
    <div class="api-box">
      <span class="api-label">🤖 Anthropic</span>
      <input type="password" class="api-input" id="anthropicKey" placeholder="sk-ant-..." />
      <div class="api-dot" id="anthropicDot"></div>
    </div>
    <div class="api-box">
      <span class="api-label">🔑 Freepik</span>
      <input type="password" class="api-input" id="freepikKey" placeholder="freepik api key..." />
      <div class="api-dot" id="freepikDot"></div>
    </div>
  </div>
  <div class="input-grid">
    <div class="panel">
      <div class="panel-head">📜 시나리오 입력</div>
      <div class="panel-body">
        <textarea id="scenario" rows="12" placeholder="시나리오를 붙여넣으세요.&#10;&#10;등장인물과 배경을 자동으로 추출해서 각각 개별 이미지를 생성합니다."></textarea>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head">🎨 스타일 고정값</div>
      <div class="panel-body">
        <textarea id="stylePrompt" rows="6" style="font-family:monospace;font-size:12px;color:#a0c0e0;">hyperrealistic 3D CGI render, ONE single person only, solo portrait, photorealistic skin texture with pores and subsurface scattering, anatomically correct facial proportions, NOT cartoon, NOT anime, NOT stylized, NOT over-expressive eyes, cinematic 8K quality, dramatic cinematic lighting, ancient Middle Eastern costume</textarea>
        <div class="style-tip">
          💡 모든 이미지에 자동 적용<br>
          캐릭터: 단일 인물 단독 이미지<br>
          배경: 인물 없는 배경씬
        </div>
        <div style="margin-top:12px;">
          <label style="font-size:11px;color:var(--text2);letter-spacing:1px;">이미지 비율</label>
          <select id="aspectRatio" style="margin-top:6px;">
            <option value="16:9">16:9 (와이드)</option>
            <option value="1:1">1:1 (정사각)</option>
            <option value="4:3">4:3 (스탠다드)</option>
            <option value="9:16">9:16 (세로)</option>
          </select>
        </div>
      </div>
    </div>
  </div>
  <div class="btn-wrap">
    <button class="btn btn-char" onclick="generate('characters')">👤 캐릭터만 생성</button>
    <button class="btn btn-bg" onclick="generate('backgrounds')">🌄 배경만 생성</button>
    <button class="btn btn-all" onclick="generate('all')">✦ 전체 생성</button>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-info">
      <span id="progressText">분석 중...</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div id="results">
    <div class="empty"><div class="empty-icon">🎬</div><div>시나리오를 입력하고 생성 버튼을 누르세요</div></div>
  </div>
</div><script>
window.addEventListener('DOMContentLoaded', () => {
  const ak = localStorage.getItem('anthropic_key');
  const fk = localStorage.getItem('freepik_key');
  if(ak){ document.getElementById('anthropicKey').value = ak; document.getElementById('anthropicDot').className = 'api-dot on'; }
  if(fk){ document.getElementById('freepikKey').value = fk; document.getElementById('freepikDot').className = 'api-dot on'; }
});
document.getElementById('anthropicKey').addEventListener('input', function(){
  document.getElementById('anthropicDot').className = 'api-dot' + (this.value.length > 10 ? ' on' : '');
  if(this.value.length > 10) localStorage.setItem('anthropic_key', this.value);
});
document.getElementById('freepikKey').addEventListener('input', function(){
  document.getElementById('freepikDot').className = 'api-dot' + (this.value.length > 10 ? ' on' : '');
  if(this.value.length > 10) localStorage.setItem('freepik_key', this.value);
});
function openLightbox(url, name){
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightboxName').textContent = name;
  document.getElementById('lightbox').className = 'lightbox show';
  document.body.style.overflow = 'hidden';
}
function closeLightbox(){
  document.getElementById('lightbox').className = 'lightbox';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeLightbox(); });
function setProgress(pct, text){
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressText').textContent = text;
}
async function generate(mode) {
  const anthropicKey = document.getElementById('anthropicKey').value.trim();
  const freepikKey = document.getElementById('freepikKey').value.trim();
  const scenario = document.getElementById('scenario').value.trim();
  const stylePrompt = document.getElementById('stylePrompt').value.trim();
  const aspectRatio = document.getElementById('aspectRatio').value;
  if(!anthropicKey){ alert('Anthropic API 키를 입력해주세요.'); return; }
  if(!freepikKey){ alert('Freepik API 키를 입력해주세요.'); return; }
  if(!scenario){ alert('시나리오를 입력해주세요.'); return; }
  document.querySelectorAll('.btn').forEach(b => b.disabled = true);
  document.getElementById('progressWrap').className = 'progress-wrap show';
  document.getElementById('results').innerHTML = '';
  setProgress(5, '시나리오 분석 중...');
  try {
    const extracted = await extractFromScenario(scenario, mode, anthropicKey);
    setProgress(30, '프롬프트 생성 완료!');
    renderCards(extracted, mode);
    const target = mode === 'characters' ? extracted.characters : mode === 'backgrounds' ? extracted.backgrounds : extracted.characters.concat(extracted.backgrounds);
    for(let i = 0; i < target.length; i++){
      const item = target[i];
      const pct = 30 + Math.round(((i+1)/target.length) * 65);
      setProgress(pct, `이미지 생성 중... (${i+1}/${target.length})`);
      const cardImg = document.getElementById('img-' + item.id);
      if(!cardImg) continue;
      try {
        const isBackground = item.type === 'background';
const finalPrompt = isBackground
  ? item.prompt + ', NO humans, NO people, NO figures, empty location only, cinematic 8K, dramatic lighting, ancient Middle Eastern setting, hyperrealistic environment render'
  : item.prompt + ', ' + stylePrompt;
        const url = await generateImage(finalPrompt, freepikKey, aspectRatio);
        if(url){
          cardImg.innerHTML = `<img src="${url}" alt="${item.name}" loading="lazy" onclick="openLightbox('${url}', '${item.name}')"/>`;
        } else {
          cardImg.innerHTML = `<div style="color:var(--text2);font-size:12px;padding:16px;">이미지 생성 실패</div>`;
        }
      } catch(e){ cardImg.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`; }
    }
    setProgress(100, '완료!');
  } catch(e){ alert('오류: ' + e.message); }
  document.querySelectorAll('.btn').forEach(b => b.disabled = false);
}
async function extractFromScenario(scenario, mode, anthropicKey){
  const modeText = mode === 'characters' ? '등장인물만' : mode === 'backgrounds' ? '배경만' : '등장인물과 배경 모두';
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': anthropicKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      messages: [{ role: 'user', content: `다음 시나리오에서 ${modeText}를 추출해서 Seedream 4.5 이미지 프롬프트를 만들어줘.\n\n시나리오:\n${scenario}\n\n중요 규칙:\n1. 캐릭터는 반드시 한 명씩 개별로 추출 (예: 정탐꾼들 → 정탐꾼 1, 정탐꾼 2로 분리 / 라합의 가족 → 아버지, 어머니, 여동생으로 분리)\n2. 같은 인물이 여러 번 나와도 한 번만 추출\n3. 캐릭터 프롬프트: 반드시 solo, one person only, single character 포함\n4. 배경 프롬프트: 반드시 absolutely NO people, NO humans, NO figures, NO characters, NO persons, empty location scene only 포함\n5. 모든 프롬프트는 영어로\n6. 하이퍼리얼리즘 묘사 위주로\n\nJSON 형식으로만 응답:\n{"characters":[{"id":"char_1","name":"이름(한국어)","type":"character","description":"한줄설명","prompt":"solo, one person only, [인물 외모/의상/감정 상세 묘사], hyperrealistic, photorealistic skin, ancient Middle Eastern setting"}],"backgrounds":[{"id":"bg_1","name":"배경이름(한국어)","type":"background","description":"한줄설명","prompt":"empty scene no people, [장소/시간/분위기 상세 묘사], hyperrealistic, cinematic establishing shot"}]}` }]
    })
  });
  const data = await res.json();
  const text = data.content[0].text;
  const match = text.match(/\{[\s\S]*\}/);
  if(!match) throw new Error('분석 실패');
  return JSON.parse(match[0]);
}
function renderCards(extracted, mode){
  function renderCards(extracted, mode){
  const container = document.getElementById('results');
  let html = '';
  const showChars = mode === 'characters' || mode === 'all';
  const showBgs = mode === 'backgrounds' || mode === 'all';
  if(showChars && extracted.characters.length > 0){
    html += `<div class="section-title">👤 캐릭터 (${extracted.characters.length}명)</div><div class="image-grid">`;
    extracted.characters.forEach(c => {
      const sp = document.getElementById('stylePrompt').value.trim();
      const fp = (c.prompt + ', ' + sp).replace(/`/g,'\\`').replace(/'/g,"\\x27");
      html += `<div class="image-card"><div class="image-card-head"><div class="image-card-name">${c.name}</div><div class="image-card-type">CHARACTER · ${c.description}</div></div><div class="image-box loading" id="img-${c.id}"><div class="spinner"></div><span style="font-size:11px;color:var(--text2);">생성 중...</span></div><div class="image-card-foot"><div class="prompt-mini">${c.prompt}</div><div style="display:flex;gap:6px;margin-top:6px;"><button class="copy-btn" style="background:rgba(200,145,58,0.15);border-color:var(--accent);color:var(--accent);" onclick="regenerateItem('${c.id}',\`${fp}\`)">🔄 재생성</button><button class="copy-btn" onclick="copyText(this,\`${c.prompt.replace(/`/g,'\\`').replace(/'/g,"\\x27")}\`)">복사</button></div></div></div>`;
    });
    html += `</div>`;
  }
  if(showBgs && extracted.backgrounds.length > 0){
    html += `<div class="section-title">🌄 배경 (${extracted.backgrounds.length}개)</div><div class="image-grid">`;
    extracted.backgrounds.forEach(b => {
      const fp = (b.prompt + ', NO humans, NO people, NO figures, empty location only, cinematic 8K, dramatic lighting, ancient Middle Eastern setting, hyperrealistic environment render').replace(/`/g,'\\`').replace(/'/g,"\\x27");
      html += `<div class="image-card"><div class="image-card-head"><div class="image-card-name">${b.name}</div><div class="image-card-type">BACKGROUND · ${b.description}</div></div><div class="image-box loading" id="img-${b.id}"><div class="spinner"></div><span style="font-size:11px;color:var(--text2);">생성 중...</span></div><div class="image-card-foot"><div class="prompt-mini">${b.prompt}</div><div style="display:flex;gap:6px;margin-top:6px;"><button class="copy-btn" style="background:rgba(200,145,58,0.15);border-color:var(--accent);color:var(--accent);" onclick="regenerateItem('${b.id}',\`${fp}\`)">🔄 재생성</button><button class="copy-btn" onclick="copyText(this,\`${b.prompt.replace(/`/g,'\\`').replace(/'/g,"\\x27")}\`)">복사</button></div></div></div>`;
    });
    html += `</div>`;
  }
  container.innerHTML = html || '<div class="empty"><div>추출된 항목이 없어요</div></div>';
}
  }
  if(showBgs && extracted.backgrounds.length > 0){
    html += `<div class="section-title">🌄 배경 (${extracted.backgrounds.length}개)</div><div class="image-grid">`;
    extracted.backgrounds.forEach(b => {
      const fp = (b.prompt + ', NO humans, NO people, NO figures, empty location only, cinematic 8K, dramatic lighting, ancient Middle Eastern setting, hyperrealistic environment render').replace(/`/g,'\\`').replace(/'/g,"\\x27");
      html += `<div class="image-card"><div class="image-card-head"><div class="image-card-name">${b.name}</div><div class="image-card-type">BACKGROUND · ${b.description}</div></div><div class="image-box loading" id="img-${b.id}"><div class="spinner"></div><span style="font-size:11px;color:var(--text2);">생성 중...</span></div><div class="image-card-foot"><div class="prompt-mini">${b.prompt}</div><div style="display:flex;gap:6px;margin-top:6px;"><button class="copy-btn" style="background:rgba(200,145,58,0.15);border-color:var(--accent);color:var(--accent);" onclick="regenerateItem('${b.id}', \`${fp}\`)">🔄 재생성</button><button class="copy-btn" onclick="copyText(this,\`${b.prompt.replace(/`/g,'\\`').replace(/'/g,"\\x27")}\`)">복사</button></div></div></div>`;
    });
    html += `</div>`;
  }
  container.innerHTML = html || '<div class="empty"><div>추출된 항목이 없어요</div></div>';
}
  }
  if(showBgs && extracted.backgrounds.length > 0){
    html += `<div class="section-title">🌄 배경 (${extracted.backgrounds.length}개)</div><div class="image-grid">`;
    extracted.backgrounds.forEach(b => { html += `<div class="image-card"><div class="image-card-head"><div class="image-card-name">${b.name}</div><div class="image-card-type">BACKGROUND · ${b.description}</div></div><div class="image-box loading" id="img-${b.id}"><div class="spinner"></div><span style="font-size:11px;color:var(--text2);">생성 중...</span></div><div class="image-card-foot"><div class="prompt-mini">${b.prompt}</div><button class="copy-btn" onclick="copyText(this,\`${b.prompt.replace(/`/g,'\\`').replace(/'/g,"\\x27")}\`)">복사</button></div></div>`; });
    html += `</div>`;
  }
  container.innerHTML = html || '<div class="empty"><div>추출된 항목이 없어요</div></div>';
}
async function generateImage(prompt, freepikKey, aspectRatio){
  const res = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt, aspect_ratio: aspectRatio, freepik_key: freepikKey }) });
  const data = await res.json();
  if(!res.ok) throw new Error(data.error || 'API 오류');
  return data.image_url;
}
function copyText(btn, text){ navigator.clipboard.writeText(text).then(() => { btn.textContent = '✓ 복사됨'; setTimeout(() => btn.textContent = '복사', 2000); }); }
async function regenerateItem(id, prompt){
  const freepikKey = document.getElementById('freepikKey').value.trim();
  const aspectRatio = document.getElementById('aspectRatio').value;
  const cardImg = document.getElementById('img-' + id);
  cardImg.className = 'image-box loading';
  cardImg.innerHTML = `<div class="spinner"></div><span style="font-size:11px;color:var(--text2);">재생성 중...</span>`;
  try {
    const url = await generateImage(prompt, freepikKey, aspectRatio);
    cardImg.className = 'image-box';
    cardImg.innerHTML = url
      ? `<img src="${url}" loading="lazy" onclick="openLightbox('${url}', '')"/>`
      : `<div class="error-msg">생성 실패</div>`;
  } catch(e){
    cardImg.className = 'image-box';
    cardImg.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`;
  }
}
